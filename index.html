<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>AR Platform - AR.js + A-Frame</title>
		<link rel="stylesheet" href="style.css" />

		<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
		<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

		<script>
			AFRAME.registerComponent("spin-on-toggle", {
				schema: {
					enabled: { type: "boolean", default: true },
					speed: { type: "number", default: 55 }
				},
				tick: function (_time, deltaMs) {
					if (!this.data.enabled) {
						return;
					}

					const rotation = this.el.getAttribute("rotation") || { x: 0, y: 0, z: 0 };
					const nextY = rotation.y + (this.data.speed * deltaMs) / 1000;
					this.el.setAttribute("rotation", `${rotation.x} ${nextY} ${rotation.z}`);
				}
			});

			AFRAME.registerComponent("ar-platform", {
				init: function () {
					const scene = this.el.sceneEl;
					const marker = document.getElementById("hiro-marker");
					const title = document.getElementById("status-text");
					const modelContainer = document.getElementById("model-container");
					const cycleButton = document.getElementById("cycle-shape");
					const spinButton = document.getElementById("toggle-spin");

					const presets = [
						{
							id: "box",
							geometry: "primitive: box; width: 1; height: 1; depth: 1",
							material: "color: #ff6f59; metalness: 0.2; roughness: 0.55"
						},
						{
							id: "sphere",
							geometry: "primitive: sphere; radius: 0.6",
							material: "color: #39a0ed; metalness: 0.2; roughness: 0.45"
						},
						{
							id: "torus-knot",
							geometry: "primitive: torusKnot; radius: 0.34; radiusTubular: 0.08; p: 2; q: 3",
							material: "color: #4caf50; metalness: 0.25; roughness: 0.35"
						}
					];

					let currentPreset = 0;
					let spinEnabled = true;

					const renderShape = () => {
						modelContainer.innerHTML = "";

						const shape = document.createElement("a-entity");
						shape.setAttribute("id", "active-shape");
						shape.setAttribute("geometry", presets[currentPreset].geometry);
						shape.setAttribute("material", presets[currentPreset].material);
						shape.setAttribute("position", "0 0.5 0");
						shape.setAttribute("spin-on-toggle", `enabled: ${spinEnabled}; speed: 55`);

						const floorShadow = document.createElement("a-ring");
						floorShadow.setAttribute("radius-inner", "0.65");
						floorShadow.setAttribute("radius-outer", "0.95");
						floorShadow.setAttribute("rotation", "-90 0 0");
						floorShadow.setAttribute("position", "0 0.01 0");
						floorShadow.setAttribute("material", "color: #000; opacity: 0.22; side: double");

						modelContainer.appendChild(shape);
						modelContainer.appendChild(floorShadow);
					};

					const setMarkerStatus = (isVisible) => {
						if (isVisible) {
							title.textContent = "Marker detected. Use controls to interact.";
							title.classList.add("is-live");
						} else {
							title.textContent = "Point camera to HIRO marker.";
							title.classList.remove("is-live");
						}
					};

					renderShape();

					marker.addEventListener("markerFound", () => setMarkerStatus(true));
					marker.addEventListener("markerLost", () => setMarkerStatus(false));

					cycleButton.addEventListener("click", () => {
						currentPreset = (currentPreset + 1) % presets.length;
						renderShape();
					});

					spinButton.addEventListener("click", () => {
						spinEnabled = !spinEnabled;
						spinButton.textContent = spinEnabled ? "Pause Rotation" : "Resume Rotation";

						const currentShape = document.getElementById("active-shape");
						if (currentShape) {
							currentShape.setAttribute("spin-on-toggle", `enabled: ${spinEnabled}; speed: 55`);
						}
					});

					scene.addEventListener("loaded", () => {
						setMarkerStatus(false);
					});
				}
			});
		</script>
	</head>
	<body>
		<div class="hud">
			<h1>AR Platform</h1>
			<p id="status-text">Starting camera...</p>
			<div class="controls">
				<button id="cycle-shape" type="button">Change Shape</button>
				<button id="toggle-spin" type="button">Pause Rotation</button>
			</div>
		</div>

		<a-scene
			arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
			renderer="antialias: true; alpha: true"
			embedded
			vr-mode-ui="enabled: false"
			ar-platform
		>
			<a-assets></a-assets>

			<a-light type="ambient" intensity="0.7"></a-light>
			<a-light type="directional" intensity="0.9" position="1 2 1"></a-light>

			<a-marker id="hiro-marker" preset="hiro">
				<a-entity id="model-container"></a-entity>
			</a-marker>

			<a-entity camera></a-entity>
		</a-scene>
	</body>
</html>
