<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">

    <!-- 3D model removed as requested -->

    <!-- Simple AR text with background flush to marker (back attached to trigger) -->
    <!-- pivot placed at the cube back-face center (marker plane) so rotation keeps back face flush -->
    <!-- pivot position: x=0, y=side/2, z=0  (side = 0.9 => y=0.45) -->
    <!-- rotated to 270deg around Y so text appears on the opposite face -->
    <a-entity id="text-group" position="0 0.45 0" rotation="0 270 0">
      <!-- cube centered at local z = side/2 so its back face is at local z=0 -->
      <a-box id="text-cube" position="0 0 0.45" width="0.9" height="0.9" depth="0.9" color="#222" opacity="0.95" material="side:double"></a-box>

      <!-- text placed on cube's front face in local coordinates (z = side) slightly offset forward -->
      <a-entity
        id="ar-text"
        position="0 0 0.47"
        rotation="0 0 0"
        scale="1.6 1.6 1.6"
        text="value: Hello AR; align: center; anchor: center; baseline: center; color: #FFFFFF; width: 0.8; wrapCount: 20"
        look-at="#camera">
      </a-entity>
    </a-entity>

  </a-marker>

  <a-entity camera id="camera"></a-entity>

</a-scene>

</body>
</html>
