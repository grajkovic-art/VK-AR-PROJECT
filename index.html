<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">

    <!-- 3D model removed as requested -->

    <!-- Simple AR text with background flush to marker (back attached to trigger) -->
    <a-entity id="text-group" position="0 0 0">
      <!-- cube that extends out from the marker: back face at z=0 (attached), front face at z=depth -->
      <!-- choose depth 0.6 so cube projects visibly from marker -->
      <a-box id="text-cube" position="0 0.5 0.3" width="1.8" height="0.9" depth="0.6" color="#222" opacity="0.95" material="side:double"></a-box>

      <!-- text placed on the cube's front face (farthest from trigger). front face z = 0.6 -> place text slightly in front at z=0.62 -->
      <a-entity
        id="ar-text"
        position="0 0.5 0.62"
        rotation="0 0 0"
        scale="1.4 1.4 1.4"
        text="value: Hello AR; align: center; anchor: center; baseline: center; color: #FFFFFF; width: 1.6; wrapCount: 20">
      </a-entity>
    </a-entity>

  </a-marker>

  <a-entity camera id="camera"></a-entity>

</a-scene>

</body>
</html>
