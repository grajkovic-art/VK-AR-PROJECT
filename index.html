  <style>

      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">

    <!-- 3D model removed as requested -->

    <!-- Simple AR text -->
    <a-entity 
      id="ar-text"
      text="value: Hello AR; align: center; color: #FFFFFF; width: 2"
      position="0 0.5 0">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
