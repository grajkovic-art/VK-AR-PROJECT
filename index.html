<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Messages</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* + button */
    #addBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      font-size: 30px;
      border-radius: 50%;
      border: none;
      background: black;
      color: white;
    }

    /* input box */
    #inputBox {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      display: none;
    }

    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }

    button.save {
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- AR Scene -->
  <a-scene embedded arjs="sourceType: webcam;">
    
    <a-marker preset="hiro">

      <a-box position="0 0.5 0" color="black"></a-box>

      <!-- TEXT THAT WILL CHANGE -->
      <a-text 
        id="messageText"
        value="Hello world"
        color="white"
        align="center"
        position="0 1.01 0"
        rotation="-90 0 0"
        scale="0.6 0.6 0.6">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- + BUTTON -->
  <button id="addBtn">+</button>
  <button id="prevBtn" style="position: fixed; bottom: 20px; left: 20px;">⬅️</button>
  <button id="nextBtn" style="position: fixed; bottom: 20px; left: 80px;">➡️</button>

  <!-- INPUT UI -->
  <div id="inputBox">
    <input type="text" id="userInput" placeholder="Write message..." />
    <button class="save" onclick="saveText()">Save</button>
  </div>

  <script>
  const addBtn = document.getElementById("addBtn");
  const inputBox = document.getElementById("inputBox");
  const userInput = document.getElementById("userInput");
  const textEntity = document.getElementById("messageText");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  // STORE MESSAGES
  let messages = ["Hello world"];
  let currentIndex = 0;

  // Show current message
  function updateDisplay() {
    textEntity.setAttribute("value", messages[currentIndex]);
  }

  // Show input
  addBtn.onclick = () => {
    inputBox.style.display = "block";
  };

  // Save new message
  function saveText() {
    const value = userInput.value;

    if (value.trim() !== "") {
      messages.push(value); // add new message
      currentIndex = messages.length - 1; // go to latest
      updateDisplay();

      userInput.value = "";
      inputBox.style.display = "none";
    }
  }

  // PREVIOUS message
  prevBtn.onclick = () => {
    if (currentIndex > 0) {
      currentIndex--;
      updateDisplay();
    }
  };

  // NEXT message
  nextBtn.onclick = () => {
    if (currentIndex < messages.length - 1) {
      currentIndex++;
      updateDisplay();
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === messages.length - 1;
    }
  };
</script>

</body>
</html>
