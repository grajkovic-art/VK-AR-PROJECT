<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Test</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js (correct build) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam;">
      
      <a-marker preset="hiro">

  <!-- Black cube -->
  <a-box 
    position="0 0.5 0" 
    color="black">
  </a-box>

  <!-- White text above cube -->
  <!-- shadow (inside) -->
<a-text 
  value="Hello world"
  color="#444"
  align="center"
  position="0 0.5 0.48"
  scale="0.7 0.7 0.7">
</a-text>

<!-- front text -->
<a-text 
  value="Hello world"
  color="white"
  align="center"
  position="0 0.5 0.51"
  scale="0.7 0.7 0.7">
</a-text>

</a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
