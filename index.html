<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">

    <!-- 3D model removed as requested -->

    <!-- Simple AR text with background flush to marker (back attached to trigger) -->
    <a-entity id="text-group" position="0 0 0">
      <!-- dark backing plane flush to marker surface -->
      <a-plane id="text-bg" position="0 0.5 0" rotation="0 0 0" width="1.8" height="0.6" color="#000" opacity="0.65"></a-plane>

      <!-- larger text placed slightly in front of the backing plane so its back is effectively attached -->
      <a-entity
        id="ar-text"
        position="0 0.5 0.02"
        text="value: Hello AR; align: center; color: #FFFFFF; width: 3; wrapCount: 20"
        look-at="#camera"
        scale="1.2 1.2 1.2">
      </a-entity>
    </a-entity>

  </a-marker>

  <a-entity camera id="camera"></a-entity>

</a-scene>

</body>
</html>
