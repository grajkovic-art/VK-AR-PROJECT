<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Wall Experience</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam;">

  <!-- MARKER -->
  <a-marker preset="hiro">

    <!-- ===================== -->
    <!-- WELCOME (NOW IN FRONT OF WALL) -->
    <!-- ===================== -->
    <a-entity id="welcomeGroup" position="0 0 0.8">

      <!-- stroke -->
      <a-text 
        value="Welcome"
        color="white"
        align="center"
        scale="2.2 2.2 2.2"
        position="0 0 0.01">
      </a-text>

      <!-- main -->
      <a-text 
        value="Welcome"
        color="black"
        align="center"
        scale="2 2 2">
      </a-text>

    </a-entity>

    <!-- ===================== -->
    <!-- CIRCLE SYSTEM (IN FRONT OF WALL) -->
    <!-- ===================== -->
    <a-entity id="circleGroup" position="0 0 1" visible="false">

  <a-plane class="paper" position="-1.2 0 0" rotation="0 20 0" width="0.6" height="0.8" color="#FF8A80"></a-plane>

  <a-plane class="paper" position="-0.8 0 0.2" rotation="0 10 0" width="0.6" height="0.8" color="#FFD54F"></a-plane>

  <a-plane class="paper" position="-0.4 0 0.3" rotation="0 5 0" width="0.6" height="0.8" color="#81C784"></a-plane>

  <a-plane class="paper" position="0 0 0.35" rotation="0 0 0" width="0.7" height="0.9" color="#4FC3F7"></a-plane>

  <a-plane class="paper" position="0.4 0 0.3" rotation="0 -5 0" width="0.6" height="0.8" color="#BA68C8"></a-plane>

  <a-plane class="paper" position="0.8 0 0.2" rotation="0 -10 0" width="0.6" height="0.8" color="#FFB74D"></a-plane>

  <a-plane class="paper" position="1.2 0 0" rotation="0 -20 0" width="0.6" height="0.8" color="#90A4AE"></a-plane>

</a-entity>

    <!-- ===================== -->
    <!-- MESSAGE (FLOATS OUT) -->
    <!-- ===================== -->
    <a-entity id="messageGroup" visible="false">

      <!-- stroke -->
      <a-text 
        id="msgStroke"
        value="I am angry"
        color="white"
        align="center"
        scale="1.5 1.5 1.5"
        position="0 0 1.21">
      </a-text>

      <!-- main -->
      <a-text 
        id="msgText"
        value="I am angry"
        color="black"
        align="center"
        scale="1.4 1.4 1.4"
        position="0 0 1.2">
      </a-text>

    </a-entity>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<!-- ===================== -->
<!-- JAVASCRIPT -->
<!-- ===================== -->
<script>

let state = "title";

const welcome = document.getElementById("welcomeGroup");
const circle = document.getElementById("circleGroup");
const messageGroup = document.getElementById("messageGroup");
const papers = document.querySelectorAll(".paper");

const msgText = document.getElementById("msgText");
const msgStroke = document.getElementById("msgStroke");

let selectedPaper = null;

// =====================
// ROTATION
// =====================
function startCircleSpin() {
  circle.setAttribute("animation__rotate", {
  property: "rotation",
  dir: "alternate",
  dur: 3000,
  loop: true,
  to: "0 5 0"
  });
}

function stopCircleSpin() {
  circle.removeAttribute("animation");
}

// =====================
// GLOBAL TAP
// =====================
document.body.addEventListener("click", () => {

  // TITLE → PAPERS
  if (state === "title") {
    welcome.setAttribute("visible", false);
    circle.setAttribute("visible", true);
    startCircleSpin();
    state = "papers";
  }

  // FOCUS → BACK
  else if (state === "focus") {

    if (selectedPaper) {
      selectedPaper.setAttribute("animation", {
        property: "position",
        to: selectedPaper.dataset.originalPosition,
        dur: 300
      });
    }

    messageGroup.setAttribute("visible", false);
    startCircleSpin();
    state = "papers";
  }

});

// =====================
// PAPER CLICK
// =====================
papers.forEach(paper => {

  // save original position
  const pos = paper.getAttribute("position");
  paper.dataset.originalPosition = `${pos.x} ${pos.y} ${pos.z}`;

  paper.addEventListener("click", () => {

    if (state !== "papers") return;

    stopCircleSpin();
    selectedPaper = paper;

    // move paper forward (towards user)
    paper.setAttribute("animation", {
      property: "position",
      to: "0 0 1.3",
      dur: 300,
      easing: "easeOutQuad"
    });

    // show message slightly in front
    msgText.setAttribute("animation", {
      property: "position",
      to: "0 0 1.6",
      dur: 300
    });

    msgStroke.setAttribute("animation", {
      property: "position",
      to: "0 0 1.61",
      dur: 300
    });

    messageGroup.setAttribute("visible", true);

    state = "focus";
  });

});

</script>

</body>
</html>
