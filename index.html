<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

      <!-- Swirling path object that will come out of the trigger -->
      <a-entity id="swirl" position="0 0 0" scale="0 0 0" swirl-path="dots: 36; radius: 0.22; turns: 3; height: 1.2; color: #4CC3D9">
      <!-- Text on upper face (always faces camera) -->
      <a-entity id="cube-text" face-camera position="0 0.6 0" rotation="-90 0 0" text="value: Hello; align: center; width: 2.4; color: #111; baseline: center"></a-entity>
      </a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const swirl = marker.querySelector('#swirl');
  if (!trigger || !swirl) return;

  let visible = false;

  function showCube() {
    swirl.removeAttribute('animation__scale');
    swirl.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      swirl.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 700; easing: easeOutElastic');
      swirl.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      swirl.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 600; easing: easeOutElastic');
      swirl.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    swirl.removeAttribute('animation__scale');
    swirl.removeAttribute('animation__pos');
    swirl.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    swirl.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

<script>
// Swirl path component: creates a helix of small spheres and animates them
AFRAME.registerComponent('swirl-path', {
  schema: {
    dots: { type: 'int', default: 28 },
    radius: { type: 'number', default: 0.22 },
    turns: { type: 'number', default: 3 },
    height: { type: 'number', default: 1.2 },
    color: { type: 'color', default: '#4CC3D9' }
  },
  init: function () {
    this.dots = [];
    const dots = this.data.dots;
    for (let i = 0; i < dots; i++) {
      const el = document.createElement('a-sphere');
      el.setAttribute('radius', 0.03);
      el.setAttribute('material', `color: ${this.data.color}; metalness: 0.25; roughness: 0.6`);
      this.el.appendChild(el);
      this.dots.push(el);
    }
  },
  tick: function (time, timeDelta) {
    const t = time / 1000;
    const dots = this.dots.length;
    const turns = this.data.turns;
    const height = this.data.height;
    const radius = this.data.radius;

    for (let i = 0; i < dots; i++) {
      // parameter along the helix, offset to create motion
      const phase = (i / dots + (t * 0.2)) * turns * Math.PI * 2;
      const y = (i / (dots - 1) - 0.5) * height + Math.sin(t * 1.2 + i) * 0.02;
      const x = Math.cos(phase) * radius;
      const z = Math.sin(phase) * radius;
      this.dots[i].setAttribute('position', `${x.toFixed(4)} ${y.toFixed(4)} ${z.toFixed(4)}`);
      // small pulsing scale
      const s = 0.5 + 0.5 * Math.abs(Math.sin(t * 2 + i * 0.4));
      this.dots[i].setAttribute('scale', `${s * 0.6} ${s * 0.6} ${s * 0.6}`);
    }
  }
});
</script>

</body>
</html>
