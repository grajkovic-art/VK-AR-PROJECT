<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Wavy object that will come out of the trigger -->
    <a-entity id="wavy" position="0 0 0" scale="0 0 0" geometry="primitive: sphere; radius: 0.36; segmentsWidth: 48; segmentsHeight: 48" material="color: #4CC3D9; metalness: 0.2; roughness: 0.6" wavy>
      <!-- Text on upper face (always faces camera) -->
      <a-entity id="cube-text" face-camera position="0 0.6 0" rotation="-90 0 0" text="value: Hello; align: center; width: 2.4; color: #111; baseline: center"></a-entity>
    </a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Wavy vertex displacement component
AFRAME.registerComponent('wavy', {
  schema: {
    amplitude: { type: 'number', default: 0.08 },
    frequency: { type: 'number', default: 1.8 },
    speed: { type: 'number', default: 1.2 }
  },
  init: function () {
    const el = this.el;
    el.addEventListener('model-loaded', () => {});

    // When using a geometry attribute on an entity, the mesh is created immediately.
    const mesh = el.getObject3D('mesh') || el.getObject3D('mesh');
    // If mesh not created yet, try to create from geometry:
    if (!mesh) {
      // try to build a mesh from geometry + material
      // A-Frame will create it automatically; we'll wait in tick until present
      this.originalPositions = null;
      return;
    }

    this.captureGeometry(mesh);
  },
  captureGeometry: function (mesh) {
    const geometry = mesh.geometry || (mesh.children && mesh.children[0] && mesh.children[0].geometry);
    if (!geometry) return;

    // Ensure BufferGeometry
    const buffer = geometry.isBufferGeometry ? geometry : new AFRAME.THREE.BufferGeometry().fromGeometry(geometry);
    const posAttr = buffer.attributes.position;
    if (!posAttr) return;

    // store original positions
    const original = new Float32Array(posAttr.array.length);
    original.set(posAttr.array);
    this.originalPositions = original;
    this.buffer = buffer;
    this.posAttr = posAttr;
  },
  tick: function (time, delta) {
    // ensure mesh available and geometry captured
    if (!this.posAttr) {
      const mesh = this.el.getObject3D('mesh');
      if (mesh) this.captureGeometry(mesh);
      return;
    }

    const positions = this.posAttr.array;
    const original = this.originalPositions;
    const amp = this.data.amplitude;
    const freq = this.data.frequency;
    const speed = this.data.speed;
    const t = time / 1000 * speed;

    for (let i = 0; i < positions.length; i += 3) {
      const ox = original[i];
      const oy = original[i + 1];
      const oz = original[i + 2];

      const r = Math.sqrt(ox * ox + oy * oy + oz * oz);
      const n = Math.sin(freq * r + t) * amp;

      // displace along vertex normal approximation (using original position normalized)
      const nx = ox / (r || 1);
      const ny = oy / (r || 1);
      const nz = oz / (r || 1);

      positions[i] = ox + nx * n;
      positions[i + 1] = oy + ny * n;
      positions[i + 2] = oz + nz * n;
    }

    this.posAttr.needsUpdate = true;
    if (this.buffer) this.buffer.computeVertexNormals();
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const wavy = marker.querySelector('#wavy');
  if (!trigger || !wavy) return;

  let visible = false;

  function showCube() {
    wavy.removeAttribute('animation__scale');
    wavy.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      wavy.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 700; easing: easeOutElastic');
      wavy.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      cube.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 600; easing: easeOutElastic');
      cube.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    wavy.removeAttribute('animation__scale');
    wavy.removeAttribute('animation__pos');
    wavy.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    wavy.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
