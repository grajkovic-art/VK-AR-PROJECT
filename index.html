<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebAR Messages</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* MESSAGE CONTAINER */
#messageBox {
  position: fixed;
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
  max-width: 80%;

  padding: 18px 28px;
  color: white;
  font-size: 18px;
  text-align: center;

  /* CORE STYLE (your Pinterest look) */
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);

  border-radius: 40px;

  /* soft glow */
  box-shadow: 
    0 0 20px rgba(255,255,255,0.15),
    inset 0 0 10px rgba(255,255,255,0.1);

  border: 2px solid rgba(255,255,255,0.4);

  transition: all 0.3s ease;
}

/* ORGANIC CURVE EFFECT */
#messageBox::before {
  content: "";
  position: absolute;
  inset: -6px;

  border-radius: 50px;

  border: 2px solid rgba(255,255,255,0.2);

  filter: blur(4px);
}

/* ADD BUTTON */
#addBtn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);

  width: 65px;
  height: 65px;

  border-radius: 50%;
  border: none;

  font-size: 30px;
  color: white;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);

  box-shadow: 0 0 20px rgba(255,255,255,0.3);

  z-index: 10;
}

/* FADE ANIMATION */
.fade {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, 20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

</style>
</head>

<body>

<div id="messageBox">Scan the trigger</div>
<button id="addBtn">+</button>

<a-scene embedded arjs>

  <!-- YOUR TRIGGER -->
  <a-marker type="pattern" url="marker.patt" id="marker">

    <!-- 3D MODEL -->
    <a-entity 
      id="model"
      gltf-model="model.glb"
      scale="0.5 0.5 0.5"
      animation-mixer>
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>

/* -------------------------
   MESSAGE SYSTEM
------------------------- */

let messages = [
  "This is the first message",
  "Try tapping left or right",
  "Add your own message below"
];

let currentIndex = messages.length - 1;
let started = false;

const messageBox = document.getElementById("messageBox");
const marker = document.querySelector("#marker");

/* -------------------------
   SHOW MESSAGE
------------------------- */

function showMessage() {
  messageBox.classList.remove("fade");
  void messageBox.offsetWidth;
  messageBox.classList.add("fade");

  messageBox.innerText = messages[currentIndex];
}

/* -------------------------
   TRIGGER DETECTION
------------------------- */

marker.addEventListener("markerFound", () => {
  if (!started) {
    started = true;

    setTimeout(() => {
      showMessage();
    }, 2000);
  }
});

marker.addEventListener("markerLost", () => {
  messageBox.innerText = "Point camera to trigger";
  started = false;
});

/* -------------------------
   TOUCH NAVIGATION
------------------------- */

document.addEventListener("click", (e) => {

  if (!started) return;

  const width = window.innerWidth;

  if (e.clientX > width / 2) {
    // RIGHT SIDE → older
    if (currentIndex > 0) currentIndex--;
  } else {
    // LEFT SIDE → newer
    if (currentIndex < messages.length - 1) currentIndex++;
  }

  showMessage();
});

/* -------------------------
   ADD MESSAGE
------------------------- */

document.getElementById("addBtn").onclick = () => {

  let text = prompt("Write your message:");

  if (text && text.trim() !== "") {
    messages.push(text);
    currentIndex = messages.length - 1;
    showMessage();
  }
};

</script>

</body>
</html>
