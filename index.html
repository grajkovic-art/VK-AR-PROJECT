<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Path that will extend out from the trigger -->
    <a-box id="path" position="0 0 0" scale="0 0 0" width="0.12" height="0.06" depth="0.6" material="color: #4CC3D9; metalness: 0.2; roughness: 0.6"></a-box>
    <!-- Text attached to the path (billboarded to camera) -->
    <a-entity id="path-text" face-camera text="value: Hello; align: center; width: 2.4; color: #111; baseline: center"></a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const path = marker.querySelector('#path');
  const pathText = marker.querySelector('#path-text');
  if (!trigger || !path) return;

  let visible = false;

  function showCube() {
    path.removeAttribute('animation__scale');
    path.removeAttribute('animation__pos');
    // determine path length from text length (characters)
    const textVal = (pathText && pathText.getAttribute('text') && pathText.getAttribute('text').value) || 'Hello';
    const chars = Math.max(1, textVal.length);
    const unitPerChar = 0.18; // meters per character (adjustable)
    const pathLength = Math.max(0.6, chars * unitPerChar);

    // set box depth to pathLength
    path.setAttribute('depth', pathLength);
    path.setAttribute('width', 0.12);
    path.setAttribute('height', 0.06);

    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) dir.set(0, 1, 0);
      dir.normalize();

      const targetDistance = 2.2; // meters
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale from 0 to 1 to reveal path length
      path.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 700; easing: easeOutElastic');
      path.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position text at the front end of the path (local z = +depth/2)
      const textLocalZ = pathLength / 2 + 0.05;
      const textY = 0.06 / 2 + 0.02;
      if (pathText) pathText.setAttribute('position', `0 ${textY} ${textLocalZ}`);

      // move back-plane opposite the camera
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      path.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic');
      path.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    path.removeAttribute('animation__scale');
    path.removeAttribute('animation__pos');
    path.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    path.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    // reset text position
    if (pathText) pathText.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
