<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Spline controller creates a closed curve in marker-local space -->
    <a-entity id="splineHost" spline-controller></a-entity>

    <!-- Main animated text and trailing copies (offsets produce motion trail) -->
    <a-entity id="texts">
      <a-entity class="splineText" follow-spline="duration: 6000; offset: 0;" text="value: Hello AR; align: center; width: 2.2; color: #fff; baseline: center"></a-entity>
      <a-entity class="splineText" follow-spline="duration: 6000; offset: 0.06;" text="value: Hello AR; align: center; width: 2.2; color: #ddd; baseline: center" material="opacity:0.9"></a-entity>
      <a-entity class="splineText" follow-spline="duration: 6000; offset: 0.12;" text="value: Hello AR; align: center; width: 2.2; color: #bbb; baseline: center" material="opacity:0.7"></a-entity>
      <a-entity class="splineText" follow-spline="duration: 6000; offset: 0.18;" text="value: Hello AR; align: center; width: 2.2; color: #999; baseline: center" material="opacity:0.5"></a-entity>
      <a-entity class="splineText" follow-spline="duration: 6000; offset: 0.24;" text="value: Hello AR; align: center; width: 2.2; color: #777; baseline: center" material="opacity:0.35"></a-entity>
    </a-entity>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// spline-controller: defines a closed CatmullRom curve in marker-local space
AFRAME.registerComponent('spline-controller', {
  init: function () {
    const pts = [];
    // smaller smooth curved loop in front of the marker (marker-local coords)
    pts.push(new AFRAME.THREE.Vector3(0.0, 0.18, 0.0));
    pts.push(new AFRAME.THREE.Vector3(0.25, 0.28, -0.35));
    pts.push(new AFRAME.THREE.Vector3(0.0, 0.42, -0.7));
    pts.push(new AFRAME.THREE.Vector3(-0.25, 0.28, -0.35));
    pts.push(new AFRAME.THREE.Vector3(0.0, 0.18, 0.0));

    this.curve = new AFRAME.THREE.CatmullRomCurve3(pts);
    this.curve.closed = true;
  }
});

// follow-spline: moves the entity along the spline defined on nearest ancestor with spline-controller
AFRAME.registerComponent('follow-spline', {
  schema: {
    duration: { type: 'int', default: 5000 },
    offset: { type: 'number', default: 0 },
    look: { type: 'boolean', default: true }
  },
  init: function () {
    this.start = Date.now();
    // find ancestor with spline-controller (marker)
    let el = this.el;
    this.host = null;
    while (el && !this.host) {
      if (el.components && el.components['spline-controller']) this.host = el;
      el = el.parentEl;
    }
    if (!this.host) {
      // try marker by id
      this.host = document.querySelector('#splineHost');
    }
  },
  tick: function () {
    if (!this.host || !this.host.components || !this.host.components['spline-controller']) return;
    const curve = this.host.components['spline-controller'].curve;
    if (!curve) return;

    const elapsed = (Date.now() - this.start) % this.data.duration;
    let u = (elapsed / this.data.duration + this.data.offset) % 1;

    // point and tangent in host (marker-local) space
    const point = curve.getPointAt(u);
    const tangent = curve.getTangentAt(u).normalize();

    // set entity local position
    this.el.object3D.position.copy(point);

    if (this.data.look) {
      // compute yaw (rotation around Y) from the tangent in host-local coords
      // atan2(x, z) gives heading where z is forward
      const yaw = Math.atan2(tangent.x, tangent.z);
      // apply yaw while keeping x and z rotations zero to stay upright
      this.el.object3D.rotation.set(0, yaw, 0);
    }
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const cube = marker.querySelector('#cube');
  if (!trigger || !cube) return;

  let visible = false;

  function showCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      cube.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 700; easing: easeOutElastic');
      cube.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      cube.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 600; easing: easeOutElastic');
      cube.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    cube.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    cube.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
