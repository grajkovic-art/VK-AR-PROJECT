<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Prototype</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam;">

  <!-- MARKER -->
  <a-marker preset="hiro" id="marker">

    <!-- ===================== -->
    <!-- WELCOME -->
    <!-- ===================== -->
    <a-entity id="welcomeGroup" position="0 1 0">

      <a-text 
        value="Welcome"
        color="white"
        align="center"
        scale="2.2 2.2 2.2"
        position="0 0 -0.01">
      </a-text>

      <a-text 
        value="Welcome"
        color="black"
        align="center"
        scale="2 2 2">
      </a-text>

    </a-entity>

    <!-- ===================== -->
    <!-- PAPER -->
    <!-- ===================== -->
    <a-entity id="paperGroup" visible="false">

      <a-plane 
        id="paper"
        position="0 0.5 0"
        width="1"
        height="0.7"
        color="#FFD54F">
      </a-plane>

    </a-entity>

    <!-- ===================== -->
    <!-- MESSAGE -->
    <!-- ===================== -->
    <a-entity id="messageGroup" visible="false">

      <a-text 
        id="msgStroke"
        value="I am angry"
        color="white"
        align="center"
        scale="1.5 1.5 1.5"
        position="0 0.5 0.01">
      </a-text>

      <a-text 
        id="msgText"
        value="I am angry"
        color="black"
        align="center"
        scale="1.4 1.4 1.4"
        position="0 0.5 0">
      </a-text>

    </a-entity>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<script>

let state = "title";

const welcome = document.getElementById("welcomeGroup");
const paperGroup = document.getElementById("paperGroup");
const messageGroup = document.getElementById("messageGroup");
const paper = document.getElementById("paper");
const msgText = document.getElementById("msgText");
const msgStroke = document.getElementById("msgStroke");

// START SPIN
function startSpin() {
  paper.setAttribute("animation", {
    property: "rotation",
    to: "0 360 0",
    loop: true,
    dur: 4000,
    easing: "linear"
  });
}

// STOP SPIN
function stopSpin() {
  paper.removeAttribute("animation");
}

// TAP INTERACTION
document.body.addEventListener("click", () => {

  // TITLE → PAPERS
  if (state === "title") {
    welcome.setAttribute("visible", false);
    paperGroup.setAttribute("visible", true);
    startSpin();
    state = "papers";
  }

  // PAPERS → MESSAGE
  else if (state === "papers") {
    stopSpin();
    messageGroup.setAttribute("visible", true);

    msgText.setAttribute("animation", {
      property: "position",
      to: "0 0.8 0",
      dur: 300
    });

    msgStroke.setAttribute("animation", {
      property: "position",
      to: "0 0.8 0.01",
      dur: 300
    });

    state = "focus";
  }

  // MESSAGE → BACK
  else if (state === "focus") {

    msgText.setAttribute("animation", {
      property: "position",
      to: "0 0.5 0",
      dur: 300
    });

    msgStroke.setAttribute("animation", {
      property: "position",
      to: "0 0.5 0.01",
      dur: 300
    });

    setTimeout(() => {
      messageGroup.setAttribute("visible", false);
      startSpin();
    }, 300);

    state = "papers";
  }

});

</script>

</body>
</html>
