<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Prototype</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene

  xr-mode-ui="enabled: true"
  renderer="logarithmicDepthBuffer: true;"
  webxr="requiredFeatures: hit-test">
  
  <!-- Camera -->
  <a-entity camera look-controls></a-entity>
  <a-box position="0 0 -1" color="red"></a-box>
</a-scene>
<a-entity id="welcomeGroup" position="0 1.5 -2">

  <!-- stroke (fake highlight) -->
  <a-text 
    value="Welcome"
    color="white"
    align="center"
    scale="2.2 2.2 2.2"
    position="0 0 -0.01">
  </a-text>

  <!-- main text -->
  <a-text 
    value="Welcome"
    color="black"
    align="center"
    scale="2 2 2">
  </a-text>

</a-entity>

<a-entity id="paperGroup" visible="false">

  <a-plane 
    id="paper"
    position="0 1.2 -2"
    width="1"
    height="0.7"
    color="#FFD54F"
    rotation="0 0 0">
  </a-plane>

</a-entity>

<a-entity id="messageGroup" visible="false">

  <!-- stroke -->
  <a-text 
    id="msgStroke"
    value="I am angry"
    color="white"
    align="center"
    scale="1.5 1.5 1.5"
    position="0 1.2 -1.99">
  </a-text>

  <!-- main -->
  <a-text 
    id="msgText"
    value="I am angry"
    color="black"
    align="center"
    scale="1.4 1.4 1.4"
    position="0 1.2 -2">
  </a-text>

</a-entity>

<script>
let state = "title";

const welcome = document.getElementById("welcomeGroup");
const paperGroup = document.getElementById("paperGroup");
const messageGroup = document.getElementById("messageGroup");
const paper = document.getElementById("paper");

// SPIN animation
function startSpin() {
  paper.setAttribute("animation", {
    property: "rotation",
    to: "0 360 0",
    loop: true,
    dur: 4000,
    easing: "linear"
  });
}

function stopSpin() {
  paper.removeAttribute("animation");
}

// TAP interaction
document.body.addEventListener("click", () => {

  // STATE 1 → TITLE
  if (state === "title") {
    welcome.setAttribute("visible", false);
    paperGroup.setAttribute("visible", true);
    startSpin();
    state = "papers";
  }

  // STATE 2 → FOCUS MESSAGE
  else if (state === "papers") {
    stopSpin();

    messageGroup.setAttribute("visible", true);

    // animate text forward
    document.getElementById("msgText").setAttribute("animation", {
      property: "position",
      to: "0 1.2 -1",
      dur: 300
    });

    document.getElementById("msgStroke").setAttribute("animation", {
      property: "position",
      to: "0 1.2 -0.99",
      dur: 300
    });

    state = "focus";
  }

  // STATE 3 → BACK TO SPIN
  else if (state === "focus") {

    // move text back
    document.getElementById("msgText").setAttribute("animation", {
      property: "position",
      to: "0 1.2 -2",
      dur: 300
    });

    document.getElementById("msgStroke").setAttribute("animation", {
      property: "position",
      to: "0 1.2 -1.99",
      dur: 300
    });

    setTimeout(() => {
      messageGroup.setAttribute("visible", false);
      startSpin();
    }, 300);

    state = "papers";
  }

});
</script>

</body>
</html>
