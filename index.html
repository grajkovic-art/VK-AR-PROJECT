<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
  
    <!-- Component: move entity along a computed curved path toward camera direction and spawn trail -->
    <script>
    AFRAME.registerComponent('curve-mover', {
      schema: {
        duration: { type: 'number', default: 2000 },
        distance: { type: 'number', default: 2.2 },
        trailInterval: { type: 'number', default: 80 },
        trailLife: { type: 'number', default: 900 },
        loop: { type: 'boolean', default: true }
      },
      init: function () {
        this.startTime = null;
        this.playing = false;
        this.trailTimer = null;
        this.elapsed = 0;
        this.marker = document.querySelector('#marker');
      },
      playPath: function () {
        this.startTime = performance.now();
        this.elapsed = 0;
        this.playing = true;
        const self = this;
        // start trail spawner
        if (this.data.trailInterval > 0) {
          this.trailTimer = setInterval(() => {
            self.spawnTrailDot();
          }, this.data.trailInterval);
        }
      },
      stopPath: function () {
        this.playing = false;
        if (this.trailTimer) { clearInterval(this.trailTimer); this.trailTimer = null; }
      },
      remove: function () {
        if (this.trailTimer) clearInterval(this.trailTimer);
      },
      spawnTrailDot: function () {
        try {
          const markerObj = this.marker.object3D;
          const worldPos = new AFRAME.THREE.Vector3();
          this.el.object3D.getWorldPosition(worldPos);
          // convert world pos to marker-local coords
          const local = worldPos.clone();
          markerObj.worldToLocal(local);
          const dot = document.createElement('a-sphere');
          dot.setAttribute('position', `${local.x} ${local.y} ${local.z}`);
          dot.setAttribute('radius', '0.03');
          dot.setAttribute('material', 'color: #4CC3D9; opacity: 0.85; shader: standard; transparent: true');
          this.marker.appendChild(dot);
          dot.setAttribute('animation__fade', `property: material.opacity; to: 0; dur: ${this.data.trailLife}; easing: linear`);
          dot.setAttribute('animation__scale', `property: scale; to: 0.01 0.01 0.01; dur: ${this.data.trailLife}; easing: linear`);
          setTimeout(() => { if (dot.parentNode) dot.parentNode.removeChild(dot); }, this.data.trailLife + 50);
        } catch (e) { /* ignore */ }
      },
      tick: function (time, dt) {
        if (!this.playing) return;
        if (!this.startTime) this.startTime = time;
        const duration = Math.max(1, this.data.duration);
        this.elapsed = time - this.startTime;
        let t = (this.elapsed % duration) / duration;
        if (!this.data.loop && this.elapsed > duration) { t = 1; this.stopPath(); }

        // compute control points in world space based on marker and camera
        const markerObj = this.marker.object3D;
        const mw = new AFRAME.THREE.Vector3();
        const cw = new AFRAME.THREE.Vector3();
        markerObj.getWorldPosition(mw);
        const cam = document.querySelector('[camera]').object3D;
        cam.getWorldPosition(cw);
        const dir = cw.clone().sub(mw).normalize();
        const up = new AFRAME.THREE.Vector3(0,1,0);
        const right = new AFRAME.THREE.Vector3().crossVectors(up, dir).normalize();

        const p0 = mw.clone().add(dir.clone().multiplyScalar(0.3)).add(up.clone().multiplyScalar(0.15));
        const p2 = mw.clone().add(dir.clone().multiplyScalar(this.data.distance)).add(up.clone().multiplyScalar(0.28));
        const p1 = mw.clone().add(dir.clone().multiplyScalar(this.data.distance * 0.45)).add(up.clone().multiplyScalar(0.8)).add(right.clone().multiplyScalar(0.4));

        // quadratic Bezier
        const invT = 1 - t;
        const posW = new AFRAME.THREE.Vector3();
        posW.x = invT*invT*p0.x + 2*invT*t*p1.x + t*t*p2.x;
        posW.y = invT*invT*p0.y + 2*invT*t*p1.y + t*t*p2.y;
        posW.z = invT*invT*p0.z + 2*invT*t*p1.z + t*t*p2.z;

        // convert world pos to marker local coords
        const local = posW.clone();
        markerObj.worldToLocal(local);
        this.el.setAttribute('position', `${local.x} ${local.y} ${local.z}`);
      }
    });
    </script>
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Cube that will come out of the trigger -->
    <a-box id="cube" position="0 0 0" scale="0 0 0" material="color: #4CC3D9; metalness: 0.2; roughness: 0.6">
      <!-- Text on upper face (always faces camera) -->
      <a-entity id="cube-text" face-camera position="0 0.6 0" rotation="-90 0 0" text="value: Hello; align: center; width: 2.4; color: #111; baseline: center"></a-entity>
    </a-box>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const cube = marker.querySelector('#cube');
  if (!trigger || !cube) return;

  let visible = false;

  function showCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      cube.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 700; easing: easeOutElastic');
      cube.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      cube.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 600; easing: easeOutElastic');
      cube.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    cube.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    cube.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
