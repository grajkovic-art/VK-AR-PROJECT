<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Segmented chain (replaces single cube) -->
    <a-entity id="chain" position="0 0 0"></a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Component: preserve element world size despite parent scaling
AFRAME.registerComponent('preserve-size', {
  schema: { base: { type: 'vec3', default: { x: 1, y: 1, z: 1 } } },
  tick: function () {
    const parent = this.el.parentEl;
    if (!parent || !parent.object3D) return;
    const pScale = parent.object3D.scale;
    // avoid division by zero
    const ix = pScale.x === 0 ? 1 : 1 / pScale.x;
    const iy = pScale.y === 0 ? 1 : 1 / pScale.y;
    const iz = pScale.z === 0 ? 1 : 1 / pScale.z;
    this.el.object3D.scale.set(this.data.base.x * ix, this.data.base.y * iy, this.data.base.z * iz);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const chain = marker.querySelector('#chain');
  if (!trigger || !chain) return;

  let visible = false;

  // chain params
  const SEGMENTS = 11;
  const SEG_LEN = 0.18;
  const CHAIN_COLOR = '#4CC3D9';
  const segments = [];
  const letters = [];
  const label = 'Hello';

  function buildChain() {
    chain.innerHTML = '';
    segments.length = 0;
    letters.length = 0;
    for (let i = 0; i < SEGMENTS; i++) {
      const s = document.createElement('a-box');
      s.setAttribute('width', SEG_LEN);
      s.setAttribute('height', 0.22);
      s.setAttribute('depth', 0.22);
      s.setAttribute('material', `color: ${CHAIN_COLOR}; metalness: 0.15; roughness: 0.6`);
      s.setAttribute('position', '0 0 0');
      s.setAttribute('scale', '0 0 0');
      s.classList.add('segment');
      chain.appendChild(s);
      segments.push(s);
    }

    const midStart = Math.floor((SEGMENTS - label.length) / 2);
    for (let i = 0; i < label.length; i++) {
      const ch = document.createElement('a-entity');
      ch.setAttribute('text', `value: ${label[i]}; align: center; width: 0.9; color: #111; baseline: center`);
      ch.setAttribute('preserve-size', '');
      ch.setAttribute('face-camera', '');
      const segIndex = Math.min(Math.max(midStart + i, 0), SEGMENTS - 1);
      segments[segIndex].appendChild(ch);
      ch.setAttribute('position', `0 0.18 0`);
      ch.setAttribute('rotation', '-90 0 0');
      letters.push(ch);
    }
  }

  buildChain();

  function showChain() {
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) dir.set(0,1,0);
      dir.normalize();
      let side = dir.clone().cross(new AFRAME.THREE.Vector3(0,1,0)).normalize();
      if (side.length() === 0) side.set(1,0,0);

      const targetDistance = 1.8;
      const worldEnd = mw.clone().add(dir.clone().multiplyScalar(targetDistance));
      const control = mw.clone().add(dir.clone().multiplyScalar(targetDistance * 0.45)).add(side.multiplyScalar(0.9));

      for (let i = 0; i < segments.length; i++) {
        const t = (i + 1) / (segments.length + 1);
        const p0 = mw;
        const p1 = control;
        const p2 = worldEnd;
        const oneMinusT = 1 - t;
        const worldP = new AFRAME.THREE.Vector3().addVectors(
          p0.clone().multiplyScalar(oneMinusT * oneMinusT),
          p1.clone().multiplyScalar(2 * oneMinusT * t)
        ).add(p2.clone().multiplyScalar(t * t));

        const localP = worldP.clone();
        markerObj.worldToLocal(localP);

        // small tangent estimate
        const dt = 0.0001;
        const tt = Math.min(1, t + dt);
        const oneMinusTt = 1 - tt;
        const worldP2 = new AFRAME.THREE.Vector3().addVectors(
          p0.clone().multiplyScalar(oneMinusTt * oneMinusTt),
          p1.clone().multiplyScalar(2 * oneMinusTt * tt)
        ).add(p2.clone().multiplyScalar(tt * tt));
        const tangent = worldP2.clone().sub(worldP).normalize();

        const seg = segments[i];
        seg.removeAttribute('animation__pos');
        seg.setAttribute('animation__pos', `property: position; to: ${localP.x} ${localP.y} ${localP.z}; dur: 700; easing: easeOutCubic`);
        seg.removeAttribute('animation__scale');
        seg.setAttribute('animation__scale', 'property: scale; to: 1.4 0.25 0.25; dur: 700; easing: easeOutCubic');

        // orient segment along tangent in marker-local space
        const localTangent = tangent.clone();
        markerObj.worldToLocal(localTangent.add(worldP)).sub(localP).normalize();
        const yaw = Math.atan2(localTangent.x, localTangent.z) * (180 / Math.PI);
        const pitch = -Math.asin(localTangent.y) * (180 / Math.PI);
        seg.setAttribute('rotation', `${pitch} ${yaw} 0`);
      }

      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.45));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        seg.setAttribute('animation__scale', 'property: scale; to: 1.4 0.25 0.25; dur: 600; easing: easeOutElastic');
        seg.setAttribute('animation__pos', `property: position; to: 0 ${0.12 + i * (SEG_LEN * 0.5)} 0; dur: 600; easing: easeOutElastic`);
      }
    }
    visible = true;
  }

  function hideChain() {
    for (let i = 0; i < segments.length; i++) {
      const seg = segments[i];
      seg.removeAttribute('animation__scale');
      seg.removeAttribute('animation__pos');
      seg.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
      seg.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    }
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideChain(); else showChain();
  });

  // reset when marker found
  marker.addEventListener('markerFound', () => {
    hideChain();
  });
});
</script>

</body>
</html>
