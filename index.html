<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Flexible segmented object (behaves as a single object) -->
    <a-entity id="flex" position="0 0 0" scale="1 1 1"></a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Component: preserve element world size despite parent scaling
AFRAME.registerComponent('preserve-size', {
  schema: { base: { type: 'vec3', default: { x: 1, y: 1, z: 1 } } },
  tick: function () {
    const parent = this.el.parentEl;
    if (!parent || !parent.object3D) return;
    const pScale = parent.object3D.scale;
    // avoid division by zero
    const ix = pScale.x === 0 ? 1 : 1 / pScale.x;
    const iy = pScale.y === 0 ? 1 : 1 / pScale.y;
    const iz = pScale.z === 0 ? 1 : 1 / pScale.z;
    this.el.object3D.scale.set(this.data.base.x * ix, this.data.base.y * iy, this.data.base.z * iz);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const flex = marker.querySelector('#flex');
  if (!trigger || !flex) return;

  // build segmented flexible object
  const SEG_COUNT = 12;
  const TOTAL_X = 1.4; // desired final length along X
  const SEG_LEN = TOTAL_X / SEG_COUNT;
  const SEG_THICK_Y = 0.25;
  const SEG_THICK_Z = 0.25;
  const segments = [];

  // create segments and a text on the last segment
  for (let i = 0; i < SEG_COUNT; i++) {
    const s = document.createElement('a-box');
    s.setAttribute('id', `seg-${i}`);
    s.setAttribute('class', 'segment');
    s.setAttribute('position', '0 0 0');
    s.setAttribute('scale', '0 0 0');
    s.setAttribute('material', 'color: #4CC3D9; metalness: 0.2; roughness: 0.6');
    flex.appendChild(s);
    segments.push(s);
  }

  // create text and attach to last segment
  const textEnt = document.createElement('a-entity');
  textEnt.setAttribute('id', 'cube-text');
  textEnt.setAttribute('face-camera', '');
  textEnt.setAttribute('preserve-size', '');
  textEnt.setAttribute('position', `0 ${SEG_THICK_Y * 1.8} 0`);
  textEnt.setAttribute('rotation', '-90 0 0');
  textEnt.setAttribute('text', 'value: Hello; align: center; width: 2.4; color: #111; baseline: center');
  segments[segments.length - 1].appendChild(textEnt);

  let visible = false;

  function showCube() {
    // hide any previous animations on segments
    segments.forEach(s => {
      s.removeAttribute('animation__pos');
      s.removeAttribute('animation__scale');
      s.removeAttribute('animation__rot');
    });
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // compute quadratic bezier control point to create bend
      const p0 = new AFRAME.THREE.Vector3(0, 0, 0);
      const p2 = localTarget.clone();
      const mid = p0.clone().add(p2).multiplyScalar(0.5);
      // create a lateral bend vector using camera-to-marker direction cross with up
      const camW = cw.clone();
      const markW = mw.clone();
      const bendDir = camW.clone().sub(markW).normalize();
      const lateral = (new AFRAME.THREE.Vector3()).crossVectors(bendDir, new AFRAME.THREE.Vector3(0,1,0)).normalize();
      const bendMag = 0.8; // tune for amount of bend
      const controlWorld = mw.clone().add(bendDir.multiplyScalar(targetDistance*0.45)).add(lateral.multiplyScalar(bendMag));
      const controlLocal = controlWorld.clone();
      markerObj.worldToLocal(controlLocal);

      const p1 = controlLocal;

      // position each segment along the quadratic bezier and orient them
      for (let i = 0; i < segments.length; i++) {
        const t = i / (segments.length - 1);
        const inv = 1 - t;
        const pos = new AFRAME.THREE.Vector3().addScaledVector(p0, inv*inv).addScaledVector(p1, 2*inv*t).addScaledVector(p2, t*t);

        // compute tangent for rotation: derivative of quadratic bezier
        const tangent = p1.clone().sub(p0).multiplyScalar(2*inv).add(p2.clone().sub(p1).multiplyScalar(2*t));
        tangent.normalize();

        // determine rotation angles: pitch (x) and yaw (y)
        const yaw = Math.atan2(tangent.x, tangent.z) * 180 / Math.PI;
        const pitch = Math.atan2(tangent.y, Math.sqrt(tangent.x*tangent.x + tangent.z*tangent.z)) * 180 / Math.PI;

        const seg = segments[i];
        // animate to computed position and rotation and scale (each seg length along X)
        const targetScale = `${SEG_LEN} ${SEG_THICK_Y} ${SEG_THICK_Z}`;
        seg.setAttribute('animation__pos', `property: position; to: ${pos.x} ${pos.y} ${pos.z}; dur: 700; easing: easeOutElastic`);
        seg.setAttribute('animation__rot', `property: rotation; to: ${pitch} ${yaw} 0; dur: 700; easing: easeOutElastic`);
        seg.setAttribute('animation__scale', `property: scale; to: ${targetScale}; dur: 700; easing: easeOutElastic`);
      }

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      // fallback animate segments to a small float
      segments.forEach((seg, i) => {
        const s = i / (segments.length - 1);
        seg.setAttribute('animation__scale', `property: scale; to: ${SEG_LEN} ${SEG_THICK_Y} ${SEG_THICK_Z}; dur: 600; easing: easeOutElastic`);
        seg.setAttribute('animation__pos', `property: position; to: 0 ${0.45 + s*0.02} 0; dur: 600; easing: easeOutElastic`);
      });
    }
    visible = true;
  }

  function hideCube() {
    // hide/contract all segments
    segments.forEach((seg, i) => {
      seg.removeAttribute('animation__pos');
      seg.removeAttribute('animation__rot');
      seg.removeAttribute('animation__scale');
      seg.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
      seg.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    });
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
