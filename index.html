<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Long wavy path that will come out of the trigger -->
    <a-entity id="path" wavy-path="length: 4.2; segments: 360; radius: 0.06; amplitude: 0.45; waves: 7; color: #4CC3D9" position="0 0 0" scale="0 0 0">
      <!-- Text attached to the path (kept at same relative spot as before) -->
      <a-entity id="cube-text" face-camera position="0 0.6 0" rotation="-90 0 0" text="value: Hello; align: center; width: 2.4; color: #111; baseline: center"></a-entity>
    </a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Component: generate a long wavy tube/path mesh
AFRAME.registerComponent('wavy-path', {
  schema: {
    length: { type: 'number', default: 3.0 },
    segments: { type: 'int', default: 240 },
    radius: { type: 'number', default: 0.06 },
    amplitude: { type: 'number', default: 0.45 },
    waves: { type: 'int', default: 6 },
    color: { type: 'color', default: '#4CC3D9' }
  },
  init: function () {
    const THREE = AFRAME.THREE;
    const data = this.data;
    const points = [];
    for (let i = 0; i <= data.segments; i++) {
      const t = i / data.segments;
      const z = t * data.length; // extend along local +Z
      const angle = t * data.waves * Math.PI * 2;
      const x = Math.sin(angle) * data.amplitude;
      const y = Math.cos(angle * 0.7) * (data.amplitude * 0.18);
      points.push(new THREE.Vector3(x, y, z));
    }

    const curve = new THREE.CatmullRomCurve3(points);
    const geometry = new THREE.TubeGeometry(curve, data.segments, data.radius, 8, false);
    const material = new THREE.MeshStandardMaterial({ color: new THREE.Color(data.color), metalness: 0.2, roughness: 0.6 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    this.el.setObject3D('mesh', mesh);
  },
  remove: function () {
    this.el.removeObject3D('mesh');
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const path = marker.querySelector('#path');
  if (!trigger || !path) return;

  let visible = false;

  function showCube() {
    path.removeAttribute('animation__scale');
    path.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      path.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 700; easing: easeOutElastic');
      path.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      path.setAttribute('animation__scale', 'property: scale; to: 0.6 0.6 0.6; dur: 600; easing: easeOutElastic');
      path.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    path.removeAttribute('animation__scale');
    path.removeAttribute('animation__pos');
    path.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    path.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
