<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Wall Carousel</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam;">

  <a-marker preset="hiro">

    <!-- ===================== -->
    <!-- WELCOME -->
    <!-- ===================== -->
    <a-entity id="welcomeGroup" position="0 0 0.8">

      <a-text value="Welcome"
        color="white"
        align="center"
        scale="2.2 2.2 2.2"
        position="0 0 0.01">
      </a-text>

      <a-text value="Welcome"
        color="black"
        align="center"
        scale="2 2 2">
      </a-text>

    </a-entity>

    <!-- ===================== -->
    <!-- CURVED PAPERS -->
    <!-- ===================== -->
    <a-entity id="circleGroup" position="0 0 0.8" visible="false">

      <a-plane class="paper" position="-1 0 0.3" rotation="0 25 0" width="0.6" height="0.8" color="#FF8A80"></a-plane>

      <a-plane class="paper" position="-0.5 0 0.5" rotation="0 10 0" width="0.6" height="0.8" color="#FFD54F"></a-plane>

      <a-plane class="paper" position="0 0 0.6" rotation="0 0 0" width="0.7" height="0.9" color="#4FC3F7"></a-plane>

      <a-plane class="paper" position="0.5 0 0.5" rotation="0 -10 0" width="0.6" height="0.8" color="#81C784"></a-plane>

      <a-plane class="paper" position="1 0 0.3" rotation="0 -25 0" width="0.6" height="0.8" color="#BA68C8"></a-plane>

    </a-entity>

    <!-- ===================== -->
    <!-- MESSAGE -->
    <!-- ===================== -->
    <a-entity id="messageGroup" visible="false">

      <a-text id="msgStroke"
        value="I am angry"
        color="white"
        align="center"
        scale="1.5 1.5 1.5"
        position="0 0 1.01">
      </a-text>

      <a-text id="msgText"
        value="I am angry"
        color="black"
        align="center"
        scale="1.4 1.4 1.4"
        position="0 0 1">
      </a-text>

    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<!-- ===================== -->
<!-- JAVASCRIPT -->
<!-- ===================== -->
<script>

// STATE
let state = "title";

// ELEMENTS
const welcome = document.getElementById("welcomeGroup");
const circle = document.getElementById("circleGroup");
const messageGroup = document.getElementById("messageGroup");

// ROTATION CONTROL
let currentRotation = 0;

// =====================
// ROTATION FUNCTIONS
// =====================
function rotateLeft() {
  currentRotation += 20;
  updateRotation();
}

function rotateRight() {
  currentRotation -= 20;
  updateRotation();
}

function updateRotation() {
  circle.setAttribute("animation", {
    property: "rotation",
    to: `0 ${currentRotation} 0`,
    dur: 300,
    easing: "easeOutQuad"
  });
}

// =====================
// TAP (STATE CONTROL)
// =====================
document.body.addEventListener("click", () => {

  // TITLE → SHOW PAPERS
  if (state === "title") {
    welcome.setAttribute("visible", false);
    circle.setAttribute("visible", true);
    state = "papers";
  }

  // FOCUS → BACK
  else if (state === "focus") {
    messageGroup.setAttribute("visible", false);
    state = "papers";
  }

});

// =====================
// SWIPE (STEP 3 - HERE)
// =====================
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX - startX > 50) {
    rotateRight(); // swipe right
  } 
  else if (startX - endX > 50) {
    rotateLeft(); // swipe left
  }
});

// =====================
// OPTIONAL TAP TO SHOW MESSAGE
// =====================
document.addEventListener("dblclick", () => {
  if (state === "papers") {
    messageGroup.setAttribute("visible", true);
    state = "focus";
  }
});

</script>

</body>
</html>
