<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Curved extruded object that will come out of the trigger -->
    <a-entity id="cube" bend-object="text: Hello; length: 2.2; segments: 80; width: 0.8; height: 0.25; amplitude: 0.9; charsSpacing: 0.18" position="0 0 0"></a-entity>

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Component: preserve element world size despite parent scaling
AFRAME.registerComponent('preserve-size', {
  schema: { base: { type: 'vec3', default: { x: 1, y: 1, z: 1 } } },
  tick: function () {
    const parent = this.el.parentEl;
    if (!parent || !parent.object3D) return;
    const pScale = parent.object3D.scale;
    // avoid division by zero
    const ix = pScale.x === 0 ? 1 : 1 / pScale.x;
    const iy = pScale.y === 0 ? 1 : 1 / pScale.y;
    const iz = pScale.z === 0 ? 1 : 1 / pScale.z;
    this.el.object3D.scale.set(this.data.base.x * ix, this.data.base.y * iy, this.data.base.z * iz);
  }
});

// Component: create an extruded curved object and place bent text along its top
AFRAME.registerComponent('bend-object', {
  schema: {
    text: { type: 'string', default: 'Hello' },
    length: { type: 'number', default: 2.2 },
    segments: { type: 'int', default: 40 },
    width: { type: 'number', default: 0.8 },
    height: { type: 'number', default: 0.25 },
    amplitude: { type: 'number', default: 0.6 },
    charsSpacing: { type: 'number', default: 0.2 }
  },
  init: function () {
    const THREE = AFRAME.THREE;
    const d = this.data;
    const el = this.el;

    // Build a smooth curve along local +Z with Y offsets (sine wave)
    const points = [];
    const steps = d.segments;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const z = t * d.length;
      const y = Math.sin(t * Math.PI * 2) * d.amplitude * (0.5 - Math.abs(t - 0.5));
      points.push(new THREE.Vector3(0, y, z));
    }

    const curve = new THREE.CatmullRomCurve3(points);

    // rectangular cross-section shape
    const w = d.width / 2;
    const h = d.height / 2;
    const shape = new THREE.Shape();
    shape.moveTo(-w, -h);
    shape.lineTo(w, -h);
    shape.lineTo(w, h);
    shape.lineTo(-w, h);
    shape.lineTo(-w, -h);

    const extrudeSettings = { steps: steps, bevelEnabled: false, extrudePath: curve };
    const geom = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geom.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({ color: 0x4CC3D9, metalness: 0.2, roughness: 0.6 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    // Center geometry so its start is near local origin (small offset)
    // by default extrude starts at z=0, so keep as-is.

    // attach mesh to this entity
    el.setObject3D('mesh', mesh);

    // Place characters along the top center of the extruded path
    const text = this.data.text || '';
    const chars = text.split('');
    const charCount = chars.length;
    const startT = 0.12;
    const endT = 0.88;

    for (let i = 0; i < charCount; i++) {
      const u = startT + (i / Math.max(1, charCount - 1)) * (endT - startT);
      const pt = curve.getPointAt(u);
      // slightly above the top surface
      const offsetY = d.height * 0.6;

      const charEl = document.createElement('a-entity');
      charEl.setAttribute('text', `value: ${chars[i]}; align: center; width: 0.4; color: #111; baseline: center`);
      charEl.setAttribute('position', `${pt.x} ${pt.y + offsetY} ${pt.z}`);
      charEl.setAttribute('preserve-size', 'base: 1 1 1');
      charEl.setAttribute('face-camera', '');
      el.appendChild(charEl);
    }
  },
  remove: function () {
    if (this.el.getObject3D('mesh')) {
      this.el.removeObject3D('mesh');
    }
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const cube = marker.querySelector('#cube');
  if (!trigger || !cube) return;

  let visible = false;

  function showCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    // compute camera-facing direction and move cube far away along that direction
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // animate scale and position to the computed local target
      cube.setAttribute('animation__scale', 'property: scale; to: 1.4 0.25 0.25; dur: 700; easing: easeOutElastic');
      cube.setAttribute('animation__pos', `property: position; to: ${localTarget.x} ${localTarget.y} ${localTarget.z}; dur: 700; easing: easeOutElastic`);

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: small float above trigger
      cube.setAttribute('animation__scale', 'property: scale; to: 1.4 0.25 0.25; dur: 600; easing: easeOutElastic');
      cube.setAttribute('animation__pos', 'property: position; to: 0 0.45 0; dur: 600; easing: easeOutElastic');
    }
    visible = true;
  }

  function hideCube() {
    cube.removeAttribute('animation__scale');
    cube.removeAttribute('animation__pos');
    cube.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 350; easing: easeOutQuad');
    cube.setAttribute('animation__pos', 'property: position; to: 0 0 0; dur: 350; easing: easeOutQuad');
    // also reset back-plane
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
