<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    #addBtn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<!-- UI removed: add button deleted as requested -->

<a-scene embedded arjs>
  
  <!-- Trigger (marker) -->
  <a-marker preset="hiro" id="marker">
    <!-- Visible trigger surface (tap this) -->
    <a-plane id="trigger" class="clickable" position="0 0 0" rotation="-90 0 0" width="1" height="1" material="color: #ffffff; opacity: 0.06; side: double"></a-plane>

    <!-- Cube removed as requested -->

    <!-- Back plane (will be moved opposite camera direction) -->
    <a-plane id="back-plane" position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="color: #222; opacity: 0.06; side: double"></a-plane>

    <!-- Solid torus ring around trigger (hidden by default) -->
    <a-torus id="solid-ring" position="0 0.01 0" rotation="-90 0 0" radius="0.65" radius-tubular="0.08" material="color: #CC80B6; metalness: 0.1; roughness: 0.4" scale="0 0 0"></a-torus>
    <!-- Container for circular text that follows ring path -->
    <a-entity id="ring-text-container" position="0 0.01 0" rotation="-90 0 0"></a-entity>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

</a-scene>

<script>
// Component: keep entity facing camera
AFRAME.registerComponent('face-camera', {
  tick: function () {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const cameraObj = cam.object3D;
    const v = new AFRAME.THREE.Vector3();
    cameraObj.getWorldPosition(v);
    this.el.object3D.lookAt(v);
  }
});

// Component: preserve element world size despite parent scaling
AFRAME.registerComponent('preserve-size', {
  schema: { base: { type: 'vec3', default: { x: 1, y: 1, z: 1 } } },
  tick: function () {
    const parent = this.el.parentEl;
    if (!parent || !parent.object3D) return;
    const pScale = parent.object3D.scale;
    // avoid division by zero
    const ix = pScale.x === 0 ? 1 : 1 / pScale.x;
    const iy = pScale.y === 0 ? 1 : 1 / pScale.y;
    const iz = pScale.z === 0 ? 1 : 1 / pScale.z;
    this.el.object3D.scale.set(this.data.base.x * ix, this.data.base.y * iy, this.data.base.z * iz);
  }
});

  // Helper: create circular text along a ring by placing characters around circumference
  function generateCircularText(container, textStr, radius, yOffset, charWidth) {
    if (!container) return;
    // clear previous
    while (container.firstChild) container.removeChild(container.firstChild);

    const total = textStr.length;
    if (total === 0) return;

    // place characters evenly around the ring, centered at top
    const startAngle = -Math.PI / 2 - (Math.PI * 2) / total / 2;
    const step = (Math.PI * 2) / total;

    for (let i = 0; i < total; i++) {
      const ch = textStr[i];
      const angle = startAngle + i * step;
      const x = radius * Math.cos(angle);
      const z = radius * Math.sin(angle);

      const charEl = document.createElement('a-entity');
      // ensure characters are visible: larger width and black color
      charEl.setAttribute('text', `value: ${ch}; align: center; width: ${charWidth}; color: #111; baseline: center`);
      charEl.setAttribute('position', `${x} ${yOffset} ${z}`);
      // rotate so the character follows ring tangent (readable along path)
      const rotY = -AFRAME.THREE.Math.radToDeg(angle) + 90;
      // because the container is rotated -90 on X, rotate characters -90 on X to lie flat
      charEl.setAttribute('rotation', `-90 ${rotY} 0`);
      // keep readable size irrespective of parent scale
      charEl.setAttribute('preserve-size', '');

      container.appendChild(charEl);
    }
  }

document.addEventListener('DOMContentLoaded', function () {
  const marker = document.querySelector('#marker');
  if (!marker) return;

  const trigger = marker.querySelector('#trigger');
  const ring = marker.querySelector('#ring');
  if (!trigger) return;

  let visible = false;

  function showCube() {
    // compute camera-facing direction and move back-plane to opposite side
    try {
      const markerObj = marker.object3D;
      const camObj = document.querySelector('[camera]').object3D;
      const mw = new AFRAME.THREE.Vector3();
      const cw = new AFRAME.THREE.Vector3();
      markerObj.getWorldPosition(mw);
      camObj.getWorldPosition(cw);

      const dir = cw.clone().sub(mw);
      if (dir.length() === 0) {
        dir.set(0, 1, 0);
      }
      dir.normalize();

      // choose a large distance so cube appears far from trigger in the camera direction
      const targetDistance = 2.2; // meters in A-Frame units
      const worldTarget = mw.clone().add(dir.multiplyScalar(targetDistance));

      // convert world target to marker-local coordinates
      const localTarget = worldTarget.clone();
      markerObj.worldToLocal(localTarget);

      // show solid torus and populate circular text
      const solid = marker.querySelector('#solid-ring');
      const textContainer = marker.querySelector('#ring-text-container');
      if (solid) {
        solid.removeAttribute('animation__scale');
        solid.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutCubic');
      }
      if (textContainer) {
        generateCircularText(textContainer, 'Trotoar je uski i svi stoje tu na stanici pa je guzva i ljudi stoje ne glupim mjestima i sporo hodaju', 0.72, 0.02, 0.35);
      }

      // position the back-plane on the opposite side of the marker (short distance)
      const backPlane = marker.querySelector('#back-plane');
      if (backPlane) {
        const backWorld = mw.clone().add(dir.clone().multiplyScalar(-0.4));
        const backLocal = backWorld.clone();
        markerObj.worldToLocal(backLocal);
        backPlane.setAttribute('position', `${backLocal.x} ${backLocal.y} ${backLocal.z}`);
      }
    } catch (e) {
      // fallback: show solid ring
      const solidFallback = marker.querySelector('#solid-ring');
      const textContainerFallback = marker.querySelector('#ring-text-container');
      if (solidFallback) {
        solidFallback.removeAttribute('animation__scale');
        solidFallback.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutCubic');
      }
      if (textContainerFallback) {
        generateCircularText(textContainerFallback, 'Trotoar je uski i svi stoje tu na stanici pa je guzva i ljudi stoje ne glupim mjestima i sporo hodaju', 0.72, 0.02, 0.35);
      }
    }
    visible = true;
  }

  function hideCube() {
    // also reset back-plane and hide ring
    const backPlane = marker.querySelector('#back-plane');
    if (backPlane) backPlane.setAttribute('position', '0 0 0');
    // hide solid ring and clear circular text
    const solid = marker.querySelector('#solid-ring');
    const textContainer = marker.querySelector('#ring-text-container');
    if (solid) {
      solid.removeAttribute('animation__scale');
      solid.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 300; easing: easeOutQuad');
    }
    if (textContainer) {
      while (textContainer.firstChild) textContainer.removeChild(textContainer.firstChild);
    }
    visible = false;
  }

  // Toggle on tap/click
  trigger.addEventListener('click', function (evt) {
    evt.stopPropagation();
    if (visible) hideCube(); else showCube();
  });

  // Also allow tapping marker area to spawn when marker is visible
  marker.addEventListener('markerFound', () => {
    // reset cube hidden when marker appears
    hideCube();
  });
});
</script>

</body>
</html>
